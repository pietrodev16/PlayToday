<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayToday | Sua Próxima Missão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="scene">
        <div class="card" id="gameCard">
            
            <div class="card__face card__face--front">
                <h1 class="title">PlayToday</h1>
                
                <div class="input-group">
                    <label for="platformInput">Onde você vai jogar?</label>
                    <select id="platformInput" onchange="toggleMobileOptions()">
                        <option value="pc">PC (Master Race)</option>
                        <option value="ps">PlayStation</option>
                        <option value="xbox">Xbox</option>
                        <option value="mobile">Mobile (Celular)</option>
                    </select>
                </div>

                <div class="input-group" id="mobileOsGroup" style="display: none;">
                    <label for="osInput">Qual o sistema?</label>
                    <select id="osInput">
                        <option value="android">Android (Play Store)</option>
                        <option value="ios">iOS (App Store)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="timeInput">Quanto tempo você tem? (min)</label>
                    <input type="number" id="timeInput" placeholder="Ex: 60">
                </div>
                
                <div class="input-group">
                    <label for="moodInput">Qual a vibe?</label>
                    <select id="moodInput">
                        <option value="chill">Zen (Relaxar)</option>
                        <option value="focus">Foco (Desafio)</option>
                        <option value="story">Imersão (História)</option>
                        <option value="social">Social (Amigos)</option>
                        <option value="competitive">Tryhard (Ranked)</option>
                        <option value="horror">Terror (Sustos)</option>
                        <option value="fast">Frenético (Ação)</option>
                    </select>
                </div>

                <button class="btn" onclick="decidirJogo()">Gerar Missão</button>
            </div>

            <div class="card__face card__face--back">
                <div class="result-content">
                    <div class="result-label">Sua missão de hoje:</div>
                    <div id="gameTime" class="hltb-badge">⏳ --h para zerar</div>
                    <h2 id="chosenGame">---</h2>
                    <p id="gameReason">---</p>
                    <div class="daily-challenge">
                        <span class="challenge-tag">🔥 Desafio do Dia</span>
                        <p id="challengeText">---</p>
                    </div>
                </div>
                <div class="extra-actions">
                    <button id="btnStore" class="btn-small">🛒 Abrir Loja</button>
                </div>
                <button class="btn btn--back" onclick="voltar()">Tentar Outra</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
